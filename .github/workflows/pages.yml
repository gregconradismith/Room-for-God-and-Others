name: Build and Deploy Jekyll Site

on:
  push:
    branches:
      - main
  schedule:
    # Rebuild once a day so static date-based pages can refresh.
    - cron: "17 10 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Pages
        uses: actions/configure-pages@v6
        with:
          enablement: true

      - name: Refresh Goodreads data
        run: ruby scripts/update_goodreads.rb

      - name: Randomize home writing
        run: ruby scripts/update_featured_writing.rb

      - name: Validate content references
        run: ruby scripts/validate_content.rb

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./_site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

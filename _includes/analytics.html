{% assign goatcounter_url = site.analytics.goatcounter_url | default: "" %}
{% assign goatcounter_src = site.analytics.goatcounter_src | default: "https://gc.zgo.at/count.js" %}
{% if goatcounter_url != "" %}
  <script data-goatcounter="{{ goatcounter_url | append: '/count' | escape }}" async src="{{ goatcounter_src | escape }}"></script>
{% endif %}

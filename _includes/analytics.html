{% assign plausible_domain = site.analytics.plausible_domain | default: "" %}
{% assign plausible_src = site.analytics.plausible_src | default: "https://plausible.io/js/script.js" %}
{% if plausible_domain != "" %}
  <script defer data-domain="{{ plausible_domain | escape }}" src="{{ plausible_src | escape }}"></script>
  <script>
    window.plausible = window.plausible || function () {
      (window.plausible.q = window.plausible.q || []).push(arguments);
    };
  </script>
{% endif %}
